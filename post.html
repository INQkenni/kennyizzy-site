<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KennyIzzy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/kennyizzy-badge.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;500;600&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .post-view{ max-width:720px; margin:0 auto; padding:56px 32px 90px;}
  .post-view .back-link{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; color:var(--raspberry); display:inline-block; margin-bottom:24px;}
  .post-view .kicker-pill{ display:inline-block; font-family:'Fredoka',sans-serif; font-weight:600; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#fff; background:var(--raspberry); padding:6px 14px; border-radius:999px; margin-bottom:16px;}
  .post-view h1{ font-family:'Baloo 2',sans-serif; font-weight:800; font-size:36px; color:var(--ink); margin:0 0 10px; line-height:1.15;}
  .post-view .post-meta-line{ font-size:13px; color:#a3948a; margin-bottom:32px; font-family:'Fredoka',sans-serif;}
  .post-view .post-content{ font-size:16.5px; line-height:1.8; color:#3a2c22;}
  .post-view .post-content p{ margin:0 0 20px;}
  .post-view .post-content em{ color:#7a6a60;}
  .not-found{ text-align:center; padding:80px 20px; color:#7a6a60;}
</style>
</head>
<body>

<header>
  <div class="wrap header-inner">
    <a href="index.html"><img class="logo-mark" src="assets/kennyizzy-logo.png" alt="KennyIzzy"></a>
    <nav>
      <div class="nav-links">
        <a href="fiction.html">Fiction</a>
        <a href="art.html">Art</a>
        <a href="feelings.html">My Feelings</a>
        <a href="about.html">About</a>
      </div>
      <a href="#" class="btn btn-primary">Say Hi</a>
    </nav>
  </div>
</header>

<div id="post-root">
  <div class="not-found">Loading…</div>
</div>

<section class="band">
  <div class="wrap band-inner">
    <div>
      <h3>Don't miss a chapter.</h3>
      <p>One warm email whenever there's a new story, sketch, or feelings post. No spam, just cozy.</p>
      <div class="band-form">
        <input type="email" placeholder="your@email.com" aria-label="Email address">
        <button>Subscribe</button>
      </div>
    </div>
    <div class="stamp-wrap">
      <img class="stamp" src="assets/kennyizzy-badge.png" alt="KennyIzzy badge mark">
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <img class="footer-logo" src="assets/kennyizzy-logo.png" alt="KennyIzzy" style="filter:grayscale(1) opacity(.55); margin-left:auto; margin-right:auto;">
    <div class="footer-links">
      <a href="fiction.html">Fiction</a>
      <a href="art.html">Art</a>
      <a href="feelings.html">My Feelings</a>
      <a href="about.html">About</a>
    </div>
    <div class="footer-copy">&copy; 2026 KennyIzzy &middot; Cozy never looked this bright.</div>
  </div>
</footer>

<script src="js/site-data.js"></script>
<script>
(async function(){
  const type = KZ.getParam('type');   // 'fiction' or 'feelings'
  const id = KZ.getParam('id');       // slugified title
  const root = document.getElementById('post-root');

  const sources = {
    fiction: { file: 'content/fiction.json', key: 'chapters', back: 'fiction.html', backLabel: 'Fiction' },
    feelings: { file: 'content/feelings.json', key: 'entries', back: 'feelings.html', backLabel: 'My Feelings' }
  };

  const src = sources[type];
  if (!src || !id) {
    root.innerHTML = '<div class="not-found">Post not found. <a href="index.html">Go home</a>.</div>';
    return;
  }

  try {
    const data = await KZ.fetchJSON(src.file);
    const list = data[src.key] || [];
    const entry = list.find(item => KZ.slugify(item.title) === id);

    if (!entry) {
      root.innerHTML = `<div class="not-found">Couldn't find that post. <a href="${src.back}">Back to ${src.backLabel}</a>.</div>`;
      return;
    }

    document.title = entry.title + ' — KennyIzzy';

    const kicker = type === 'fiction'
      ? (entry.series === 'One-shots' ? 'One-shot' : `${entry.series}${entry.chapterNumber ? ' · Ch. ' + entry.chapterNumber : ''}`)
      : entry.mood;

    root.innerHTML = `
      <div class="post-view">
        <a href="${src.back}" class="back-link">&larr; Back to ${src.backLabel}</a>
        <span class="kicker-pill">${kicker}</span>
        <h1>${entry.title}</h1>
        <div class="post-meta-line">${KZ.formatDate(entry.date)} &middot; ${entry.readTime || ''}</div>
        <div class="post-content">${KZ.renderMarkdown(entry.body || entry.excerpt || '')}</div>
      </div>
    `;
  } catch (e) {
    root.innerHTML = '<div class="not-found">Something went wrong loading this post.</div>';
    console.error(e);
  }
})();
</script>

</body>
</html>
