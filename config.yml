backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: simple

collections:
  - name: "fiction"
    label: "Fiction"
    label_singular: "Fiction Chapter List"
    files:
      - file: "content/fiction.json"
        label: "Chapters"
        name: "fiction"
        fields:
          - label: "Chapters"
            name: "chapters"
            widget: "list"
            summary: "{{fields.series}} — Ch. {{fields.chapterNumber}}: {{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Series name", name: "series", widget: "string", hint: "Use 'One-shots' for standalone stories" }
              - { label: "Chapter number", name: "chapterNumber", widget: "number", required: false, hint: "Leave blank for one-shots" }
              - { label: "Total chapters in series", name: "seriesTotalChapters", widget: "number", required: false }
              - label: "Series status"
                name: "seriesStatus"
                widget: "select"
                options: ["ongoing", "completed", "standalone"]
              - { label: "Short excerpt (shown on the list)", name: "excerpt", widget: "text" }
              - { label: "Read time", name: "readTime", widget: "string", default: "5 min read" }
              - { label: "Date", name: "date", widget: "datetime" }
              - { label: "Full chapter text", name: "body", widget: "markdown" }

  - name: "art"
    label: "Art Gallery"
    label_singular: "Art Piece List"
    files:
      - file: "content/art.json"
        label: "Gallery Pieces"
        name: "art"
        fields:
          - label: "Pieces"
            name: "pieces"
            widget: "list"
            summary: "{{fields.title}} ({{fields.category}})"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["Finished piece", "Sketches", "Process", "Palettes"]
              - label: "Color tone (only used if no image is uploaded)"
                name: "tone"
                widget: "select"
                options:
                  - { label: "Berry & Gold", value: "a" }
                  - { label: "Sky Blue", value: "b" }
                  - { label: "Gold & Chocolate", value: "c" }
                  - { label: "Moss Green", value: "d" }
              - { label: "Upload image (recommended)", name: "image", widget: "image", required: false }
              - { label: "Emoji fallback (used only if no image is uploaded)", name: "glyph", widget: "string", required: false, default: "🎨" }
              - { label: "Caption / notes (optional)", name: "caption", widget: "text", required: false }

  - name: "feelings"
    label: "My Feelings"
    label_singular: "Journal Entry List"
    files:
      - file: "content/feelings.json"
        label: "Journal Entries"
        name: "feelings"
        fields:
          - label: "Entries"
            name: "entries"
            widget: "list"
            summary: "{{fields.mood}} — {{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Mood"
                name: "mood"
                widget: "select"
                options: ["Gentle", "Grateful", "Heavy", "Hopeful"]
              - { label: "Date", name: "date", widget: "datetime" }
              - { label: "Short excerpt (shown on the list)", name: "excerpt", widget: "text" }
              - { label: "Read time", name: "readTime", widget: "string", default: "4 min read" }
              - { label: "Full entry text", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    label_singular: "Settings"
    files:
      - file: "content/settings.json"
        label: "General Settings"
        name: "settings"
        fields:
          - { label: "Pinterest profile URL (the 'Follow on Pinterest' button)", name: "pinterestUrl", widget: "string" }
          - { label: "Pinterest board URL (the live feed embed)", name: "pinterestBoardUrl", widget: "string" }
          - { label: "Homepage hero tagline", name: "heroTagline", widget: "string" }
          - { label: "Homepage hero subheading", name: "heroSubhead", widget: "text" }
          - { label: "Fiction page — 'Currently reading' series name", name: "currentlyReadingSeries", widget: "string" }
          - { label: "Fiction page — 'Currently reading' blurb", name: "currentlyReadingBlurb", widget: "text" }
          - { label: "Feelings page — 'Today's mood' title", name: "currentMoodTitle", widget: "string" }
          - { label: "Feelings page — 'Today's mood' blurb", name: "currentMoodBlurb", widget: "text" }
          - { label: "About page — intro paragraph", name: "aboutIntro", widget: "markdown" }
          - { label: "About page — story section title", name: "aboutStoryTitle", widget: "string" }
          - { label: "About page — story section body", name: "aboutStoryBody", widget: "markdown" }
